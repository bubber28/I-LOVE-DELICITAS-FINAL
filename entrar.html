<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Delicitas - Entrar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF6B6B",
                        "primary-foreground": "#ffffff",
                        "background": "#fffcfc",
                        "surface": "#ffffff",
                        "on-surface": "#2d1a1a",
                        "muted": "#f4ebeb",
                        "on-muted": "#7c6a6a",
                        "border": "#f0e1e1",
                        "input": "#f9f1f1",
                        "ring": "#FF6B6B"
                    },
                    fontFamily: {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                    },
                    borderRadius: {
                        "lg": "1.25rem",
                        "md": "0.75rem",
                        "sm": "0.5rem"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top right, #fff5f5, #ffffff);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 107, 107, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
    </style>
</head>
<body class="font-sans text-on-surface min-h-screen flex flex-col bg-background">

    <div class="flex-grow flex flex-col items-center justify-center p-6 w-full">
        <main class="w-full max-w-[400px]">
            <div class="flex flex-col items-center mb-10 text-center">
                <div class="mb-6 relative">
                    <div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
                    <a href="/">
                        <div class="w-24 h-24 bg-[#ffe9e7] rounded-full flex items-center justify-center relative shadow-sm hover:scale-105 transition-transform">
                            <span class="material-symbols-outlined text-[#FF6B6B] text-5xl">bakery_dining</span>
                        </div>
                    </a>
                </div>
                <h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">Bem-vindo(a)</h1>
                <p class="text-on-muted text-sm font-medium">
                    Entre para saborear o que há de melhor na Nova Cintra.
                </p>
            </div>

            <div class="glass-card rounded-lg p-6 md:p-8 shadow-xl shadow-primary/5">
                <form class="space-y-5" id="login-form" onsubmit="handleLogin(event)">
                    <div class="space-y-1.5">
                        <label class="text-sm font-semibold leading-none" for="email">E-mail</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-muted">
                                <span class="material-symbols-outlined text-[20px]">mail</span>
                            </div>
                            <input class="flex h-12 w-full rounded-md border border-input bg-input/50 px-11 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring transition-all" id="email" placeholder="seu@email.com" required type="email"/>
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center">
                            <label class="text-sm font-semibold leading-none" for="password">Senha</label>
                            <a class="text-xs font-bold text-primary hover:underline transition-all" href="#" onclick="alert('Recuperação de senha em breve!')">Esqueci minha senha</a>
                        </div>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-on-muted">
                                <span class="material-symbols-outlined text-[20px]">lock</span>
                            </div>
                            <input class="flex h-12 w-full rounded-md border border-input bg-input/50 px-11 py-2 text-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring transition-all" id="password" placeholder="••••••••" required type="password"/>
                        </div>
                    </div>

                    <div class="pt-2">
                        <button class="inline-flex items-center justify-center rounded-full text-sm font-bold bg-primary text-primary-foreground hover:bg-primary/90 h-12 px-4 py-2 w-full shadow-lg shadow-primary/20 active:scale-[0.98] gap-2 transition-all" type="submit">
                            Entrar
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </button>
                    </div>
                </form>

                <script>
                    const SUPABASE_URL = 'https://qjvhwqvexqjvhwqvexq.supabase.co';
                    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqdmh3cXZleHFqdmh3cXZleHEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY5ODg2NjQwMCwiZXhwIjoxOTk0NDQyNDAwfQ.2QwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQw';
                    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                    async function handleLogin(event) {
                        event.preventDefault();
                        const email = document.getElementById('email').value;
                        const password = document.getElementById('password').value;
                        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                        if (error) {
                            alert('Erro ao entrar: ' + error.message);
                            return;
                        }
                        // AJUSTE 404: Redirecionamento correto para a Home
                        window.location.href = '/';
                    }
                </script>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <span class="w-full border-t border-border"></span>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-white px-3 text-on-muted font-bold tracking-wider">Ou continue com</span>
                    </div>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-on-muted text-sm font-medium">
                        Não tem uma conta? 
                        <a class="text-primary font-bold hover:underline transition-all ml-1" href="#" onclick="alert('Cadastro em breve! Volte para a loja para pedir.')">Criar conta</a>
                    </p>
                </div>
                
                <div class="mt-6 text-center">
                    <a href="/" class="text-sm font-bold text-gray-400 hover:text-primary transition-colors">&larr; Voltar para a loja</a>
                </div>
            </div>
        </main>
    </div>

    <footer class="w-full bg-white/50 border-t border-[#FF6B6B]/10 py-6 text-center text-xs text-gray-500 mt-auto">
        <div class="max-w-4xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <strong>I Love Delicitas</strong> • CNPJ: 61.316.392/0001-97<br>
                Belo Horizonte - MG
            </div>
            <div class="flex gap-4">
                <a href="/termos.html" class="hover:text-primary">Termos</a>
                <a href="/privacidade.html" class="hover:text-primary">Privacidade</a>
                <a href="https://wa.me/5531995722258" class="hover:text-primary">WhatsApp: (31) 99572-2258</a>
            </div>
        </div>
    </footer>

</body>
</html>
