<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .confectionery-glass {
            background: rgba(255, 248, 247, 0.7);
            backdrop-filter: blur(12px);
        }
        .editorial-shadow {
            box-shadow: 0 20px 40px -10px rgba(37, 24, 24, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar Mapping -->
<header class="w-full top-0 sticky bg-[#fff8f7] dark:bg-zinc-950 flex items-center justify-between px-6 py-4 w-full max-w-md mx-auto z-50">
<button class="text-[#FF6B6B] dark:text-[#FF6B6B] hover:bg-[#ffe9e7] dark:hover:bg-zinc-800 transition-colors rounded-full p-2 flex items-center justify-center scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#251818] dark:text-zinc-400">Check Your Email</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-24 max-w-md mx-auto w-full">
<!-- Success Illustration / Brand Identity -->
<div class="relative mb-12">
<!-- Background Decorative Shape -->
<div class="absolute -top-6 -left-6 w-32 h-32 bg-surface-container-high rounded-full blur-3xl opacity-60"></div>
<div class="absolute -bottom-6 -right-6 w-24 h-24 bg-secondary-container rounded-full blur-2xl opacity-40"></div>
<div class="relative z-10 w-48 h-48 bg-surface-container-low rounded-xl flex items-center justify-center editorial-shadow overflow-hidden">
<img alt="Email Success Illustration" class="w-full h-full object-cover opacity-90" data-alt="Minimalist pink envelope with a heart icon floating" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwVpu7gckRE2_j_IvfWWcjuSfIvTBUR2Dwez0m4lCPVuHV8C39CuFj3WdML3zrsutgQdJoiHn7y39zMe_okUqoCdYI0OROLu-GtklDbgzbkuEXvABNKsdae_3z05I1esL91vlQPocyAb3yYwFBd5UVxg91vHFADg4hIo0QZzNE-XGCU1zgv4BvLzoeNkV0Wlr3Jy7Os-OhIpMFwGyZEODxEJWbEDUTjFmwOQl9MsxrqtNz74wMtuFi_VxqXqxSEaLi93MVMv6R76V8"/>
<div class="absolute inset-0 bg-primary/10 flex items-center justify-center">
<div class="bg-surface-container-lowest p-4 rounded-full shadow-lg">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
</div>
</div>
<!-- Typography Content -->
<div class="text-center space-y-4">
<img alt="I Love Delicitas Logo" class="h-8 mx-auto mb-2 opacity-80" data-alt="I Love Delicitas elegant script logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAuL-yNhYWSAYdHTrln1O1oyKziJYG5E5SEqmpad21aHHjZDoIIwiML63J4G5rKTPKlZPBajfmWoGJqx0rd-NgOS9GuzClrQmJ8jyDGRngn2yPfZu8ylzOeq6N7W3Kr3lgEPK93mJmlqaHAY3FeewBgZpWo4Oxr8XgqrJkmBEH96hBxiQrX47a-kg0u4QBtzL5vYgWtawALfZrfOTBmG2kPlzrqwQQ3W4Ik1-ZrUHagLutOaPGJGwR8WxhBOH5XyZ7uIrqfzCNPpsh"/>
<h2 class="font-headline font-extrabold text-3xl text-on-background tracking-tight leading-tight">
                E-mail enviado com sucesso!
            </h2>
<p class="font-body text-on-surface-variant leading-relaxed px-2">
                Verifique sua caixa de entrada (e a pasta de spam) para as instruções de recuperação de senha.
            </p>
</div>
<!-- Actions -->
<div class="w-full mt-10 space-y-4">
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:bg-surface-tint active:scale-95 transition-all duration-200">
                Abrir App de E-mail
            </button>
<button class="w-full bg-surface-container text-primary font-headline font-bold py-4 rounded-full hover:bg-surface-container-high transition-colors">
                Entendi
            </button>
</div>
<!-- Footer Link -->
<div class="mt-8 flex flex-col items-center">
<p class="text-sm text-on-surface-variant font-medium">Não recebeu?</p>
<button class="text-primary font-bold hover:underline underline-offset-4 transition-all mt-1">
                Reenviar código
            </button>
</div>
</main>
<!-- BottomNavBar Mapping (Suppressed based on focused journey rule, but kept placeholder structure if needed for context) -->
<!-- Per instructions: "suppress the navigation shell if the page intent is: Success/Confirmation splash screens" -->
<!-- Toast / Notification Layering (Editorial Style) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-xs">
<div class="confectionery-glass rounded-full px-6 py-3 flex items-center justify-center gap-3 editorial-shadow border border-white/20">
<span class="material-symbols-outlined text-primary" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="text-xs font-bold text-on-surface tracking-wide uppercase">Instruções enviadas</span>
</div>
</div>
