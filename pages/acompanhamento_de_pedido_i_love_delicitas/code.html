<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhar Pedido - I Love Delicitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-red-600 text-white p-4">
        <h1 class="text-2xl font-bold text-center">Acompanhar Pedido</h1>
        <a href="/" class="absolute left-4 top-4 text-white text-sm">Voltar</a>
    </header>

    <main class="container mx-auto p-4 max-w-md">
        <div class="bg-white rounded-lg shadow p-6">
            <p class="text-center text-gray-600 mb-4">Digite o código do seu pedido</p>
            <input type="text" id="codigo" placeholder="Ex: DEL2403241234" class="w-full px-4 py-3 border rounded-lg mb-4 text-center">
            <button onclick="buscarPedido()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700">
                Buscar
            </button>
        </div>

        <div id="resultado" class="mt-4 hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-bold text-lg mb-2">Status do Pedido</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span>Recebido</span>
                        <span id="status_recebido" class="text-gray-400">⭘</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>Preparando</span>
                        <span id="status_preparando" class="text-gray-400">⭘</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>Saiu para entrega</span>
                        <span id="status_entrega" class="text-gray-400">⭘</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span>Entregue</span>
                        <span id="status_entregue" class="text-gray-400">⭘</span>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t">
                    <p id="detalhes" class="text-sm text-gray-600"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function buscarPedido() {
            var codigo = document.getElementById('codigo').value.trim();
            if (!codigo) {
                alert('Digite o código do pedido');
                return;
            }

            fetch('/api/acompanhamento/' + codigo)
                .then(function(res) {
                    if (!res.ok) throw new Error('Pedido nao encontrado');
                    return res.json();
                })
                .then(function(pedido) {
                    var total = pedido.total || (pedido.total_cents / 100) || 0;
                    var statusMap = {
                        'received': 'recebido',
                        'preparing': 'preparando',
                        'delivering': 'entrega',
                        'delivered': 'entregue'
                    };
                    
                    var statusAtual = statusMap[pedido.status] || 'recebido';
                    
                    var statusList = ['recebido', 'preparando', 'entrega', 'entregue'];
                    for (var i = 0; i < statusList.length; i++) {
                        var el = document.getElementById('status_' + statusList[i]);
                        if (el) {
                            if (statusList[i] === statusAtual) {
                                el.innerHTML = '●';
                                el.className = 'text-green-600 font-bold';
                            } else if (statusList.indexOf(statusList[i]) < statusList.indexOf(statusAtual)) {
                                el.innerHTML = '●';
                                el.className = 'text-green-600';
                            } else {
                                el.innerHTML = '○';
                                el.className = 'text-gray-400';
                            }
                        }
                    }
                    
                    document.getElementById('detalhes').innerHTML = 'Pedido #' + pedido.id + '<br>Total: R$ ' + total.toFixed(2);
                    document.getElementById('resultado').classList.remove('hidden');
                })
                .catch(function(err) {
                    alert('Pedido nao encontrado. Verifique o codigo.');
                });
        }
    </script>
</body>
</html>
