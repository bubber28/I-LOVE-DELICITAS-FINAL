<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .candy-gradient {
            background: linear-gradient(135deg, #FF6B6B 0%, #ae2f34 100%);
        }

            backdrop-filter: blur(12px);
            background: rgba(255, 248, 247, 0.7);
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 z-50 sticky bg-[#fff8f7] dark:bg-slate-950 flex items-center justify-between px-6 py-4">
<button class="text-[#FF6B6B] dark:text-[#ff8e8e] p-2 hover:bg-[#fff0ef] transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#FF6B6B] dark:text-[#ff8e8e]">Recuperar Acesso</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col items-center justify-center px-8 pb-12 relative overflow-hidden">
<!-- Background Elements (Editorial Style) -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-80 h-80 bg-primary-container/10 rounded-full blur-3xl"></div>
<!-- Success Content Card -->
<div class="w-full max-w-md flex flex-col items-center text-center z-10">
<!-- Brand Logo -->
<div class="mb-12">
<img alt="I Love Delicitas Logo" class="h-16 object-contain" data-alt="Logotipo colorido da confeitaria I Love Delicitas" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnrV0iaovAIDeH1O0H84Ga4nTuIFs3UPimywXxSXO97dnhoJIorVbbbFzzSriCFahI1Dt-7E58_l6CHmNILPOrg2Khij3xUE21iTK9Qp_Tal2BdfyG3sEutKXc7PNrLZRlIJZmvSZvi12fb3rOW0Xl47TD1DvLtsXOqViMLKFwy-7Hv4dXXnVB1EAiO_ogzeZDfjUbf6Askd5bWrpj9iN4SEKL4MkgCkXtWb5BDvH5IHCBaWVoWFtuGQzZ97LY91lFy6KWOPli5UzO"/>
</div>
<!-- Central Hero Icon with Asymmetric Decorative Layer -->
<div class="relative mb-8">
<div class="absolute -inset-4 bg-tertiary-fixed/30 rounded-xl rotate-12 scale-110"></div>
<div class="relative w-32 h-32 bg-surface-container-lowest rounded-lg shadow-[0_20px_40px_rgba(37,24,24,0.06)] flex items-center justify-center">
<span class="material-symbols-outlined text-7xl text-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<!-- Miniature Candy Details -->
<div class="absolute -top-2 -right-2 w-8 h-8 candy-gradient rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
</div>
<!-- Success Messaging -->
<h2 class="font-headline font-extrabold text-3xl text-on-surface mb-4 leading-tight">
                E-mail enviado com sucesso!
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed mb-10 max-w-[280px]">
                Enviamos um link de recuperação para o seu e-mail. Verifique sua caixa de entrada e spam.
            </p>
<!-- Action Area -->
<div class="w-full space-y-4">
<button class="w-full py-4 px-8 candy-gradient text-on-primary font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined">mail</span>
                    Abrir App de E-mail
                </button>
<div class="pt-6 border-t border-outline-variant/15">
<p class="text-on-surface-variant font-medium">
                        Não recebeu? 
                        <button class="text-primary font-bold hover:underline ml-1">
                            Reenviar código
                        </button>
</p>
</div>
</div>
</div>
</main>
<!-- Bottom Decorative Section (Instead of Nav for transactional screen) -->
<footer class="w-full py-8 px-6 text-center opacity-40">
<p class="text-xs font-label uppercase tracking-widest text-on-surface-variant">I Love Delicitas © 2024</p>
</footer>
