<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - I Love Delicitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-600">I Love Delicitas</h1>
            <p class="text-gray-600 mt-2">Crie sua conta</p>
        </div>

        <form id="cadastroForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Nome completo</label>
                <input type="text" id="nome" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">E-mail</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Telefone</label>
                <input type="tel" id="telefone" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <div>
                <label class="block text-gray-700 font-semibold mb-2">Senha</label>
                <input type="password" id="senha" required class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700 transition">
                Cadastrar
            </button>
        </form>

        <p class="text-center text-gray-600 mt-4">
            Já tem conta? <a href="/login" class="text-red-600 font-bold">Faça login</a>
        </p>
    </div>

    <script>
        document.getElementById('cadastroForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const senha = document.getElementById('senha').value;
            
            try {
                const res = await fetch('/api/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, telefone, senha })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    alert('Cadastro realizado com sucesso! Faça login.');
                    window.location.href = '/login';
                } else {
                    alert(data.error || 'Erro ao cadastrar');
                }
            } catch (err) {
                alert('Erro de conexão. Tente novamente.');
            }
        };
    </script>
</body>
</html>
