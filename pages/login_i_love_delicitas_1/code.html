<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - I Love Delicitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md border-t-8 border-red-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-600">I Love Delicitas</h1>
            <p class="text-gray-600 mt-2">Faca seu login</p>
        </div>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">E-mail</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Senha</label>
                <input type="password" id="senha" required class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-red-500">
            </div>
            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition-all">
                Entrar
            </button>
        </form>
        <p class="text-center text-gray-600 mt-6">
            Ainda nao tem conta? <a href="/cadastro" class="text-red-600 font-bold">Cadastre-se</a>
        </p>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    localStorage.setItem('usuario', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.error || 'Erro no login');
                }
            } catch (err) {
                alert('Erro de conexao');
            }
        };
    </script>
</body>
</html>
