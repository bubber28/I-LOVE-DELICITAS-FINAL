<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - I Love Delicitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-red-600 text-white p-4">
        <h1 class="text-2xl font-bold text-center">Meus Pedidos</h1>
        <a href="/" class="absolute left-4 top-4 text-white text-sm">Voltar</a>
    </header>

    <main class="container mx-auto p-4 max-w-lg">
        <div id="pedidos" class="space-y-4">
            <p class="text-center text-gray-500 py-8">Carregando pedidos...</p>
        </div>
    </main>

    <script>
        var usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
        
        if (!usuario) {
            window.location.href = '/login';
        }
        
        function formatarData(dataISO) {
            var data = new Date(dataISO);
            return data.toLocaleDateString('pt-BR');
        }
        
        function getStatusText(status) {
            var statusMap = {
                'received': 'Recebido',
                'preparing': 'Preparando',
                'delivering': 'Saiu para entrega',
                'delivered': 'Entregue',
                'canceled': 'Cancelado'
            };
            return statusMap[status] || status;
        }
        
        function getStatusColor(status) {
            var colorMap = {
                'received': 'bg-yellow-100 text-yellow-800',
                'preparing': 'bg-blue-100 text-blue-800',
                'delivering': 'bg-purple-100 text-purple-800',
                'delivered': 'bg-green-100 text-green-800',
                'canceled': 'bg-red-100 text-red-800'
            };
            return colorMap[status] || 'bg-gray-100 text-gray-800';
        }
        
        fetch('/api/pedidos/usuario/' + (usuario.id || usuario.email))
            .then(function(res) { return res.json(); })
            .then(function(pedidos) {
                var container = document.getElementById('pedidos');
                if (!pedidos || pedidos.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 py-8">Nenhum pedido encontrado</p>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < pedidos.length; i++) {
                    var p = pedidos[i];
                    var total = p.total || (p.total_cents / 100) || 0;
                    html += `
                        <div class="bg-white rounded-lg shadow p-4">
                            <div class="flex justify-between items-start border-b pb-2 mb-2">
                                <div>
                                    <p class="text-sm text-gray-500">Pedido #${p.id ? p.id.slice(0,8) : i+1}</p>
                                    <p class="text-xs text-gray-400">${formatarData(p.created_at)}</p>
                                </div>
                                <span class="text-xs px-2 py-1 rounded-full ${getStatusColor(p.status)}">${getStatusText(p.status)}</span>
                            </div>
                            <div class="mb-2">
                                <p class="font-bold">Total: R$ ${total.toFixed(2)}</p>
                                <p class="text-sm text-gray-600">${p.customer_name || usuario.nome || ''}</p>
                            </div>
                            <a href="/acompanhamento/${p.id}" class="block text-center bg-red-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-red-700">
                                Acompanhar Pedido
                            </a>
                        </div>
                    `;
                }
                container.innerHTML = html;
            })
            .catch(function(err) {
                console.error(err);
                document.getElementById('pedidos').innerHTML = '<p class="text-center text-red-500 py-8">Erro ao carregar pedidos</p>';
            });
    </script>
</body>
</html>
