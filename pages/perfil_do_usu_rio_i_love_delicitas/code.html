<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - I Love Delicitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-red-600 text-white p-4">
        <h1 class="text-2xl font-bold text-center">Meu Perfil</h1>
        <a href="/" class="absolute left-4 top-4 text-white text-sm">Voltar</a>
    </header>

    <main class="container mx-auto p-4 max-w-md">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="text-center mb-6">
                <div class="w-24 h-24 bg-gray-300 rounded-full mx-auto flex items-center justify-center text-gray-600">
                    <span class="text-3xl">U</span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-gray-600 text-sm">Nome</label>
                    <p id="nome" class="text-lg font-semibold">Carregando...</p>
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">E-mail</label>
                    <p id="email" class="text-lg font-semibold">Carregando...</p>
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Telefone</label>
                    <p id="telefone" class="text-lg font-semibold">Carregando...</p>
                </div>
                <div>
                    <label class="block text-gray-600 text-sm">Membro desde</label>
                    <p id="data" class="text-lg font-semibold">Carregando...</p>
                </div>
            </div>

            <button onclick="logout()" class="w-full mt-6 bg-red-600 text-white py-3 rounded-lg font-bold hover:bg-red-700">
                Sair
            </button>
        </div>
    </main>

    <script>
        var usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
        
        if (!usuario) {
            window.location.href = '/login';
        } else {
            document.getElementById('nome').innerText = usuario.nome || usuario.name || '-';
            document.getElementById('email').innerText = usuario.email || '-';
            document.getElementById('telefone').innerText = usuario.telefone || usuario.phone || 'Nao informado';
            document.getElementById('data').innerText = usuario.created_at ? new Date(usuario.created_at).toLocaleDateString() : '-';
        }
        
        function logout() {
            localStorage.removeItem('usuario');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
