<body class="bg-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 dark:bg-[#1a1111]/70 backdrop-blur-xl shadow-sm shadow-[#251818]/5 dark:shadow-none">
<div class="flex items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<button class="material-symbols-outlined text-[#FF6B6B] dark:text-[#ff8a8a] mr-4 hover:bg-[#fff0ef] dark:hover:bg-[#2d1e1e] transition-colors rounded-full p-2 active:scale-95 duration-200 ease-out" data-icon="arrow_back">arrow_back</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#FF6B6B] dark:text-[#ff8a8a]">Adicionar Produto</h1>
<div class="ml-auto flex items-center gap-4">
<img alt="I Love Delicitas Logo" class="h-8 w-auto" data-alt="I Love Delicitas circular brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiiThNzBJCInvEM0H3Uf_76it_prU07BR-khU1IhTROch79bQzQwrFzRnQe-a8xgjdyOfMr_GebBmFil2mowcPpmRjKOA-Dk2zykgy_CasNENxGYMDWjT_aEayxDG0KMTcZ_LgJABUAe9aQzPYUvccwVNOCZNtMEWKxT3up73CPjDxNjcuEViWl3f1F65K9NfYci0IsF-fjy5H4509CBhCbmPsUqultyy8xMh_ICsi3evDtmgLeEq6syAatJ9iyX0OowbO7EfvbeSy"/>
</div>
</div>
</header>
<main class="pt-24 px-4 max-w-2xl mx-auto">
<!-- Form Container -->
<div class="bg-surface-container-lowest rounded-lg p-6 md:p-8 shadow-[0_8px_30px_rgb(37,24,24,0.04)] border border-outline-variant/15">
<form class="space-y-8">
<!-- Image Upload Section -->
<div class="space-y-3">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Foto do Produto</label>
<div class="relative group">
<div class="w-full h-48 rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-2 group-hover:bg-surface-container transition-colors cursor-pointer">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="add_a_photo">add_a_photo</span>
<span class="text-sm font-medium text-on-surface-variant">Arraste ou clique para enviar</span>
</div>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
<!-- Basic Info -->
<div class="space-y-6">
<div class="grid grid-cols-1 gap-6">
<!-- Product Name -->
<div class="space-y-2">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Nome do Produto</label>
<input class="w-full px-4 py-3 rounded-md bg-surface-container-low border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-outline/60 font-medium" placeholder="Ex: Cupcake de Red Velvet" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Descrição Detalhada</label>
<textarea class="w-full px-4 py-3 rounded-md bg-surface-container-low border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-outline/60 font-medium resize-none" placeholder="Descreva os ingredientes, sabor e textura..." rows="4"></textarea>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Price -->
<div class="space-y-2">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Preço (Cents)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold text-sm">R$</span>
<input class="w-full pl-10 pr-4 py-3 rounded-md bg-surface-container-low border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-outline/60 font-medium" placeholder="000" type="number"/>
</div>
</div>
<!-- Stock -->
<div class="space-y-2">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Estoque</label>
<input class="w-full px-4 py-3 rounded-md bg-surface-container-low border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-outline/60 font-medium" placeholder="Unidades" type="number"/>
</div>
</div>
</div>
<!-- Category & Status -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
<div class="space-y-2">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Categoria</label>
<select class="w-full px-4 py-3 rounded-md bg-surface-container-low border-none focus:ring-2 focus:ring-secondary/40 text-on-surface font-medium appearance-none">
<option>Cupcakes</option>
<option>Bolos Artesanais</option>
<option>Docinhos</option>
<option>Bebidas Quentes</option>
</select>
</div>
<div class="flex items-center justify-between p-3 rounded-md bg-surface-container-low">
<span class="font-bold text-sm uppercase tracking-wider text-on-surface">Produto Ativo</span>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-secondary"></div>
</label>
</div>
</div>
<!-- Customizations -->
<div class="space-y-6 pt-4">
<!-- Colors (Multi-select style) -->
<div class="space-y-3">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Cores Disponíveis</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-secondary text-on-secondary text-xs font-bold uppercase tracking-tight flex items-center gap-1" type="button">Rosa Pastel <span class="material-symbols-outlined text-sm" data-icon="close">close</span></button>
<button class="px-4 py-2 rounded-full bg-surface-container border border-outline-variant/30 text-on-surface-variant text-xs font-bold uppercase tracking-tight flex items-center gap-1" type="button">Creme</button>
<button class="px-4 py-2 rounded-full bg-surface-container border border-outline-variant/30 text-on-surface-variant text-xs font-bold uppercase tracking-tight flex items-center gap-1" type="button">Chocolate</button>
<button class="p-2 rounded-full bg-surface-container-high text-primary hover:bg-primary hover:text-on-primary transition-all" type="button"><span class="material-symbols-outlined text-sm" data-icon="add">add</span></button>
</div>
</div>
<!-- Sizes -->
<div class="space-y-3">
<label class="font-headline font-bold text-on-surface text-sm uppercase tracking-wider">Tamanhos / Porções</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-secondary text-on-secondary text-xs font-bold uppercase tracking-tight flex items-center gap-1" type="button">Individual <span class="material-symbols-outlined text-sm" data-icon="close">close</span></button>
<button class="px-4 py-2 rounded-full bg-secondary text-on-secondary text-xs font-bold uppercase tracking-tight flex items-center gap-1" type="button">Combo x6 <span class="material-symbols-outlined text-sm" data-icon="close">close</span></button>
<button class="px-4 py-2 rounded-full bg-surface-container border border-outline-variant/30 text-on-surface-variant text-xs font-bold uppercase tracking-tight flex items-center gap-1" type="button">Combo x12</button>
<button class="p-2 rounded-full bg-surface-container-high text-primary hover:bg-primary hover:text-on-primary transition-all" type="button"><span class="material-symbols-outlined text-sm" data-icon="add">add</span></button>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="pt-6">
<button class="w-full py-5 rounded-full bg-primary text-on-primary font-headline font-extrabold text-lg shadow-[0_12px_24px_rgba(174,47,52,0.2)] active:scale-95 transition-all flex items-center justify-center gap-3" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
                        Salvar Produto
                    </button>
</div>
</form>
</div>
</main>

<nav class="fixed bottom-0 w-full z-50 rounded-t-[3rem] bg-[#fff8f7]/70 dark:bg-[#1a1111]/70 backdrop-blur-xl shadow-[0_-8px_30px_rgb(37,24,24,0.06)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3">
<a class="flex flex-col items-center justify-center text-[#251818]/50 dark:text-[#fff8f7]/50 px-5 py-2 hover:text-[#FF6B6B] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold tracking-wide uppercase mt-1">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#ffe9e7] dark:bg-[#3d2626] text-[#FF6B6B] rounded-[2rem] px-5 py-2 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="bakery_dining" style="font-variation-settings: 'FILL' 1;">bakery_dining</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold tracking-wide uppercase mt-1">Produtos</span>
</a>
<a class="flex flex-col items-center justify-center text-[#251818]/50 dark:text-[#fff8f7]/50 px-5 py-2 hover:text-[#FF6B6B] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold tracking-wide uppercase mt-1">Pedidos</span>
</a>
<a class="flex flex-col items-center justify-center text-[#251818]/50 dark:text-[#fff8f7]/50 px-5 py-2 hover:text-[#FF6B6B] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Be_Vietnam_Pro'] text-[11px] font-semibold tracking-wide uppercase mt-1">Perfil</span>
</a>
</div>
</nav>
</body></html>
