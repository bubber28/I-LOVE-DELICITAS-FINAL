<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Carrinho - I Love Delicitas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ae2f34",
                        "primary-container": "#ff6b6b",
                        "secondary": "#006a65",
                        "surface": "#fff8f7",
                        "surface-container-low": "#fff0ef",
                        "surface-container": "#ffe9e7",
                        "on-surface": "#251818",
                        "on-surface-variant": "#584140"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "full": "9999px"},
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
            background-color: #fff8f7;
        }
    </style>
</head>
<body class="text-on-surface">
    <header class="fixed top-0 w-full z-50 bg-[#fff8f7]/70 backdrop-blur-xl shadow-sm">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl">bakery_dining</span>
                <span class="text-2xl font-black text-primary tracking-tight">I Love Delicitas</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/carrinho" class="material-symbols-outlined text-primary p-2 hover:bg-surface-container-low rounded-full transition-colors">shopping_bag</a>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-32 px-4 max-w-5xl mx-auto min-h-screen">
        <div class="mb-8">
            <h1 class="text-4xl font-extrabold text-on-surface tracking-tight">Seu Carrinho</h1>
            <p class="text-on-surface-variant mt-2" id="contadorItens">Carregando...</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <div class="lg:col-span-2 space-y-4" id="itensContainer">
                <div class="text-center py-10">Carregando itens...</div>
            </div>

            <div class="space-y-6">
                <div class="bg-surface-container rounded-lg p-6 shadow-sm">
                    <h2 class="text-xl font-bold mb-4">Resumo do Pedido</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between text-on-surface-variant">
                            <span>Subtotal</span>
                            <span id="subtotal">R$ 0,00</span>
                        </div>
                        <div class="flex justify-between text-on-surface-variant">
                            <span>Taxa de Entrega</span>
                            <span>R$ 7,00</span>
                        </div>
                        <div class="flex justify-between text-secondary font-semibold" id="descontoRow" style="display: none;">
                            <span>Desconto</span>
                            <span id="descontoValor">- R$ 0,00</span>
                        </div>
                        <div class="pt-4 border-t border-outline-variant/30 flex justify-between items-end">
                            <span class="font-bold text-lg">Total</span>
                            <div class="text-right">
                                <span class="text-3xl font-extrabold text-primary tracking-tight" id="total">R$ 0,00</span>
                            </div>
                        </div>
                    </div>
                    <button id="btnFinalizar" class="w-full mt-8 py-4 bg-primary text-white rounded-full font-extrabold text-lg flex items-center justify-center gap-2 hover:scale-[1.02] transition-all shadow-lg shadow-primary/20">
                        Finalizar Pedido
                        <span class="material-symbols-outlined">chevron_right</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
        
        function atualizarCarrinho() {
            const container = document.getElementById('itensContainer');
            const subtotalSpan = document.getElementById('subtotal');
            const totalSpan = document.getElementById('total');
            const contadorSpan = document.getElementById('contadorItens');
            
            if (carrinho.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-center bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant/30">
                        <span class="material-symbols-outlined text-6xl text-outline mb-4">shopping_cart_off</span>
                        <h2 class="text-2xl font-bold">Seu carrinho está vazio</h2>
                        <p class="text-on-surface-variant max-w-xs mt-2">Parece que você ainda não escolheu suas delícias de hoje.</p>
                        <a href="/" class="mt-6 px-8 py-3 bg-primary text-white rounded-full font-bold hover:scale-105 transition-all">Ver Cardápio</a>
                    </div>
                `;
                subtotalSpan.innerText = 'R$ 0,00';
                totalSpan.innerText = 'R$ 0,00';
                contadorSpan.innerText = 'Seu carrinho está vazio';
                document.getElementById('btnFinalizar').disabled = true;
                return;
            }
            
            let subtotal = 0;
            contadorSpan.innerText = `Você tem ${carrinho.reduce((s, i) => s + i.quantity, 0)} itens no carrinho.`;
            
            container.innerHTML = carrinho.map((item, idx) => {
                subtotal += item.price * item.quantity;
                return `
                    <div class="bg-white rounded-lg p-4 flex gap-4 items-center shadow-sm">
                        <div class="w-24 h-24 rounded-md overflow-hidden flex-shrink-0 bg-surface-container">
                            <img class="w-full h-full object-cover" src="${item.image_url || 'https://via.placeholder.com/100?text=Salgadinho'}">
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-bold text-lg">${item.name}</h3>
                            <p class="text-on-surface-variant text-sm mb-2">${item.description || ''}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-primary font-bold text-lg">R$ ${item.price.toFixed(2)}</span>
                                <div class="flex items-center bg-gray-100 rounded-full px-2 py-1">
                                    <button onclick="alterarQuantidade(${idx}, -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full text-primary transition-colors">-</button>
                                    <span class="px-4 font-bold">${item.quantity}</span>
                                    <button onclick="alterarQuantidade(${idx}, 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-full text-primary transition-colors">+</button>
                                </div>
                            </div>
                        </div>
                        <button onclick="removerItem(${idx})" class="text-on-surface-variant/40 hover:text-red-600 transition-colors p-2">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                `;
            }).join('');
            
            const entrega = 7.00;
            const total = subtotal + entrega;
            subtotalSpan.innerText = `R$ ${subtotal.toFixed(2)}`;
            totalSpan.innerText = `R$ ${total.toFixed(2)}`;
        }
        
        function alterarQuantidade(index, delta) {
            const item = carrinho[index];
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    carrinho.splice(index, 1);
                }
                localStorage.setItem('carrinho', JSON.stringify(carrinho));
                atualizarCarrinho();
            }
        }
        
        function removerItem(index) {
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            atualizarCarrinho();
        }
        
        document.getElementById('btnFinalizar').onclick = () => {
            if (carrinho.length === 0) return;
            localStorage.setItem('pedido', JSON.stringify(carrinho));
            window.location.href = '/checkout';
        };
        
        atualizarCarrinho();
    </script>
</body>
</html>
