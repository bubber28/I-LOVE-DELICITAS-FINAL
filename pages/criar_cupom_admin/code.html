</div>
</div>
<!-- Input: Desconto -->

<label class="block font-label text-[11px] font-bold uppercase tracking-widest text-on-surface-variant mb-3">Desconto (%)</label>

<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/50">percent</span>
</div>
</div>

<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary/50">calendar_today</span>

</div>
