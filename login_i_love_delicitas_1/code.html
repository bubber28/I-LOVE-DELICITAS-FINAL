<body class="font-body text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container/30">

<!-- Header Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary-container rounded-full blur-lg opacity-20 animate-pulse"></div>
<img alt="Logo Delicitas" class="w-24 h-24 object-contain relative" data-alt="Delicitas artisanal dessert brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuOw8vYOx_RetURl_1Dp1vkNj2j3WtRPRbcENlUHoCDb059048S3oqOSiE_1ia5GIpXCduTjGcjhTe6QoUTK34Uk3TR4piRu2trwtnBfYR_xHoS4cJIkI8YhXuqvMQXU4ik8Jr493bLNNSOxpYo19A3tYrxKT5kBQBTkuJ24ECGeqUmK30UqDJ6qqR_rwU1L57jf60xVAuCGeQoF5vbIO5HhhxTz6B1wI-FrQUJIHaXKL-Cm_crBTfqitdR0i21OimCB2Oi3UTEPEv"/>

<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">Bem-vindo(a)</h1>
<p class="text-on-surface-variant font-medium text-sm leading-relaxed">
                    Entre para saborear o que há de melhor em nossa confeitaria editorial.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface-variant px-1 block" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/40 group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-md text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-secondary/40 transition-all duration-200 text-sm" id="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-on-surface-variant" for="password">Senha</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Esqueceu?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/40 group-focus-within:text-primary-container transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-4 bg-surface-container-low border-none rounded-md text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-secondary/40 transition-all duration-200 text-sm" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/40 hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-white font-headline font-bold py-4 rounded-full shadow-[0_8px_20px_rgba(255,107,107,0.3)] hover:shadow-[0_12px_25px_rgba(255,107,107,0.4)] active:scale-95 transition-all duration-300 text-lg flex items-center justify-center gap-2 group" type="submit">
                        Entrar
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Social/Footer Section -->
<div class="mt-10">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute w-full h-[1px] bg-outline-variant/30"></div>
<span class="relative px-4 bg-transparent text-[11px] font-bold tracking-widest uppercase text-on-surface-variant/50">Ou continue com</span>
</div>
<div class="grid grid-cols-2 gap-4 mb-10">
<button class="flex items-center justify-center gap-3 py-3 bg-white border border-outline-variant/20 rounded-md hover:bg-surface-container transition-colors active:scale-95">

<span class="text-sm font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 bg-white border border-outline-variant/20 rounded-md hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-blue-600" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
<span class="text-sm font-semibold text-on-surface">Facebook</span>
</button>
</div>
<div class="text-center">
<p class="text-on-surface-variant text-sm font-medium">
                        Não tem uma conta? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2 decoration-primary-container/30 transition-all ml-1" href="#">Criar conta</a>
</p>
</div>
</div>
</div>
