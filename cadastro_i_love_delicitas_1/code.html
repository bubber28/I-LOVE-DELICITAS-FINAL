<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Decorative Background Elements (The "Sprinkles") -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary-container/30 rounded-full blur-3xl"></div>

<main class="w-full max-w-md z-10">
<div class="surface-container-low rounded-xl p-8 shadow-2xl shadow-primary/5 border border-outline-variant/10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-8 text-center">
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary-container/20 blur-xl rounded-full scale-150"></div>
<img alt="I Love Delicitas Logo" class="h-24 w-24 object-contain relative z-10" data-alt="Boutique pastry shop logo with elegant typography" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyjXR8NvAteScuCy-L_s3zNnuQLZuYwczSkmYTwacD3ApSvZv1kpM5bYnvHheWsbNcrX1DKZQ6vYLTqmsdOtFXQYppTry71hj0futZ0vOfGB73GPIisvShPU4fkTzAcooCZt3UhtTgFR4Uts3GqrutL8ljwY1SmQCKvSntH9mIZJ4mIRtlGEnDaa0AIbErYQ4lI31gO2V6Xk_7lbnrbTjRRzpVxNYLcBZGLIbu6B-qxFKBZUWqV_zlsd4hFsTzqEgI8fKi7sgARIhc"/>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">
                    Criar conta
                </h1>
<p class="text-on-surface-variant mt-2 font-medium">
                    Junte-se à nossa comunidade doce
                </p>
</div>
<!-- Form -->
<form action="#" class="space-y-5" onsubmit="return false;">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold ml-2 text-on-surface-variant" for="nome">Nome</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-on-surface-variant/50 transition-all font-medium" id="nome" placeholder="Seu nome completo" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold ml-2 text-on-surface-variant" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-on-surface-variant/50 transition-all font-medium" id="email" placeholder="seu@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold ml-2 text-on-surface-variant" for="senha">Senha</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-secondary/40 text-on-surface placeholder:text-on-surface-variant/50 transition-all font-medium" id="senha" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/70 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 px-2 py-1">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                        Ao clicar em Cadastrar, você concorda com nossos <a class="text-primary font-bold hover:underline" href="#">Termos de Uso</a> e <a class="text-primary font-bold hover:underline" href="#">Política de Privacidade</a>.
                    </label>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-primary-container text-on-primary-container font-headline font-bold text-lg rounded-full shadow-lg shadow-primary-container/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Cadastrar
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<!-- Login Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-medium">
                    Já tem uma conta? 
                    <a class="text-primary font-extrabold hover:underline ml-1" href="#">Fazer login</a>
</p>
</div>
</div>
<!-- Secondary Actions (Social Sign Up) -->
<div class="mt-8">
<div class="flex items-center gap-4 mb-6">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-xs font-bold text-on-surface-variant/50 uppercase tracking-widest">Ou continue com</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="flex gap-4">
<button class="flex-1 py-3 bg-surface-container-lowest rounded-md flex items-center justify-center border border-outline-variant/10 shadow-sm hover:bg-white transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="Google colorful logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA30TV8vrRiPL5mfoWX2Xrq_j34u72Cj7vTfLoU_8d9WdGjp7MVIAw9j4fkOdMKErelIKDvIPKSetH4SBODYFwu0pDRm1ccR1If-wBQdpcn4icburhznecfY9pwCrCFVvB23IaBnBe6PlnRWmUlLC_RfBVzuZABLdz5B7lVHkzhUPd4TPF_dkOTrbMWGzh_6Yzn17NmuK8sBCTJp8Dx-mb1B8hlvgV43Zf5pNv_3FGzbRN55z4-YmuzKh0HSszxnKLVuBXSrAXCKxC8"/>
</button>
<button class="flex-1 py-3 bg-surface-container-lowest rounded-md flex items-center justify-center border border-outline-variant/10 shadow-sm hover:bg-white transition-colors">
<img alt="Facebook" class="w-5 h-5" data-alt="Facebook blue logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRtQddQLbXYC_Lot8k0j27900xY_vCz0drBEQVaMaw0phu7_a22uBY99w-5cspZHeONXWg7d3RXhmAAkTozRWbBNBpbVERwTR6BhjNNOSjxwe-4ptE3NzMAZq48GoLLfmY3TG4AKkSCuFIdqeYJYw56r7R0vNmQl0rCrxoPkiIvvrjZhphNyGdtPpAe7EI8L82zOA_qp_HlZju--DH35TRlr_eNGfFKGC6ArKP9mQWOHumS4vORdqNsLetbfuYfYm-k_IM4Ghkj-53"/>
</button>
<button class="flex-1 py-3 bg-surface-container-lowest rounded-md flex items-center justify-center border border-outline-variant/10 shadow-sm hover:bg-white transition-colors">
<img alt="Apple" class="w-5 h-5" data-alt="Apple dark logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfSGuKbWSyrp2mEgzRZacDidAHit9QFbRasvPjQqw8K0KFaysrgcg_D87DpWqRIDhR6ePD_PX1mWDfgBQG4tZ-jCi66gxA8yQ-J6N__3nTk6-aj84f9A3cswxn2MhaGbTmCsLQDceg4J1ZePh6SQcyNmTEsmsC7XwEcp2wLD7jCUgqSwmAIsDdGJb4Gu0YA0ywj6DRmOHQF8S4BQr98TP6VYgFC8FqsYaANERHAnjGlFpMP5FRTbpvdEixVg3l-bmqOO_CWCj0pZa2"/>
</button>
</div>
</div>
</main>
<!-- Footer Aesthetic Detail -->
<div class="fixed bottom-6 left-0 w-full text-center">
<p class="text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant/30">
            Delicitas © 2024 — Artisanal Confectionery
        </p>
</div>
</body></html>
