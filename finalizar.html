<script>
// Atualização de estoque após finalização do pedido
const SUPABASE_URL = 'https://qjvhwqvexqjvhwqvexq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqdmh3cXZleHFqdmh3cXZleHEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY5ODg2NjQwMCwiZXhwIjoxOTk0NDQyNDAwfQ.2QwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQwQw';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function atualizarEstoque() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  for (const item of cart) {
    // Supondo que cada item tem id e quantity
    await supabase.from('produtos').update({ estoque: supabase.literal('estoque - ' + item.quantity) }).eq('id', item.id);
  }
  localStorage.removeItem('cart');
}

async function finalizarPedido() {
  await atualizarEstoque();
  alert('Pedido finalizado e estoque atualizado!');
  window.location.href = '/pedido_confirmado_i_love_delicitas_1/code.html';
}
</script>
